# Spring Boot
server.port=${PORT:8080}

# File upload limits (matches the Python 5MB limit)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Application-specific paths
app.template-path=jrsu_word_file.docx
app.output-dir=output
app.upload-dir=uploads

# LibreOffice executable (use full path if not on PATH)
# Windows example: C:/Program Files/LibreOffice/program/soffice.exe
# Linux/Docker: soffice
app.libreoffice-path=soffice
